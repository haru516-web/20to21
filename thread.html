<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thread</title>
  <link rel="icon" type="image/png" href="favicon,20to21.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="screen thread-screen">
    <section id="threadInfo" class="thread-info-card"></section>
    <section id="messageList" class="message-list"></section>

    <div class="message-input-bar">
      <input
        type="text"
        id="messageInput"
        class="message-input"
        placeholder="Write a comment"
        maxlength="200"
      />
      <button id="sendMessageBtn" class="send-button">Send</button>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
